<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS SPACE | Tizimga kirish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #13172b;
            font-family: 'Inter', sans-serif;
        }

        /* Canvas fills the full viewport */
        #constellation-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
        }

        /* Center everything over canvas */
        .page-wrapper {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* MARS Logo */
        .mars-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 62px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 8px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            text-shadow: 0 0 40px rgba(255,255,255,0.15);
        }
        .mars-dot {
            width: 36px; height: 36px;
            background: #ff5722;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,87,34,0.8);
            animation: pulse 2s infinite alternate;
            flex-shrink: 0;
        }
        @keyframes pulse {
            from { box-shadow: 0 0 12px rgba(255,87,34,0.6); transform: scale(1); }
            to   { box-shadow: 0 0 28px rgba(255,87,34,1);   transform: scale(1.08); }
        }

        /* Auth Card */
        .auth-card {
            width: 460px;
            background: rgba(20, 23, 36, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 36px 40px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .card-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .offer-link {
            color: #8a8a9a;
            font-size: 13px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .lang-pill {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 5px 14px;
            color: #ccc;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .lang-pill i { color: #ff5722; }

        h2 {
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .sub {
            text-align: center;
            color: #7a7a8e;
            font-size: 13px;
            margin-bottom: 28px;
        }

        /* Tabs */
        .tabs {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            display: flex;
            padding: 5px;
            margin-bottom: 26px;
        }
        .tab {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            color: #777;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
        }
        .tab.active {
            background: #fff;
            color: #13172b;
            font-weight: 700;
        }

        /* Forms */
        .form-section { display: none; }
        .form-section.visible { display: block; animation: fadeUp 0.3s ease forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .field { margin-bottom: 14px; }
        .field input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 15px 18px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s;
        }
        .field input::placeholder { color: #555; }
        .field input:focus {
            outline: none;
            border-color: rgba(255,87,34,0.6);
            background: rgba(255,255,255,0.1);
        }

        .submit-btn {
            width: 100%;
            background: #cd7760;
            border: none;
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 6px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            background: #e0886d;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(205,119,96,0.45);
        }

        .switch-link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #777;
        }
        .switch-link a { color: #ccc; font-weight: 600; cursor: pointer; text-decoration: none; }
        .switch-link a:hover { color: #fff; }

        /* Flash messages */
        .flash { padding: 11px 14px; border-radius: 9px; font-size: 13px; text-align: center; margin-bottom: 16px; }
        .flash-error   { background: rgba(202,71,84,0.18); border: 1px solid rgba(202,71,84,0.5); color: #ffb3b8; }
        .flash-success { background: rgba(76,175,80,0.18); border: 1px solid rgba(76,175,80,0.5); color: #a5d6a7; }
    </style>
</head>
<body>

<!-- Full-screen constellation canvas -->
<canvas id="constellation-canvas"></canvas>

<div class="page-wrapper">
    <!-- Logo -->
    <div class="mars-logo">MARS <div class="mars-dot"></div></div>

    <!-- Auth Card -->
    <div class="auth-card">
        <div class="card-topbar">
            <a href="#" class="offer-link"><i class="fa-regular fa-file-lines"></i> Offerta</a>
            <div class="lang-pill"><i class="fa-solid fa-globe"></i> O'zb</div>
        </div>

        <h2>Spacega xush kelibsiz</h2>
        <p class="sub">Bugun nimani o'rganamiz?</p>

        <div id="flash-message" class="flash" style="display: none;"></div>

        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="switchTab('login')">Log In</button>
            <button class="tab" id="tab-reg" onclick="switchTab('register')">Sign In (Register)</button>
        </div>

        <!-- Login -->
        <div id="f-login" class="form-section visible">
            <form id="login-form">
                <div class="field"><input type="email" name="email" placeholder="Email / Mars ID" required></div>
                <div class="field"><input type="password" name="password" placeholder="Parol" required></div>
                <button type="submit" class="submit-btn">Kirish</button>
            </form>
            <div class="switch-link">Akkauntga ega emasmisiz? <a onclick="switchTab('register')">Ro'yhatdan o'tish</a></div>
        </div>

        <!-- Register -->
        <div id="f-register" class="form-section">
            <form id="register-form">
                <div class="field"><input type="text" name="username" placeholder="To'liq Ismingiz" required></div>
                <div class="field"><input type="email" name="email" placeholder="Email" required></div>
                <div class="field"><input type="password" name="password" placeholder="Parol" required></div>
                <button type="submit" class="submit-btn">Ro'yhatdan o'tish</button>
            </form>
            <div class="switch-link">Akkauntingiz bormi? <a onclick="switchTab('login')">Kirish</a></div>
        </div>
    </div>
</div>

<script>
    /* ---------- Tab switching ---------- */
    function switchTab(t) {
        const isLogin = t === 'login';
        document.getElementById('f-login').classList.toggle('visible', isLogin);
        document.getElementById('f-register').classList.toggle('visible', !isLogin);
        document.getElementById('tab-login').classList.toggle('active', isLogin);
        document.getElementById('tab-reg').classList.toggle('active', !isLogin);
    /* ---------- Form Submissions ---------- */
    function showFlash(message, type) {
        const fm = document.getElementById('flash-message');
        fm.textContent = message;
        fm.className = 'flash flash-' + type;
        fm.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        try {
            const response = await fetch('http://127.0.0.1:8000/api/auth/login', {
                method: 'POST',
                body: formData // OAuth2PasswordRequestForm expects form data
            });
            const data = await response.json();
            if (response.ok) {
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('role', data.role);
                if (data.role === 'admin') window.location.href = 'admin.html';
                else if (data.role === 'teacher') window.location.href = 'teacher.html';
                else window.location.href = 'index.html';
            } else {
                showFlash(data.detail || 'Xatolik yuz berdi!', 'error');
            }
        } catch (err) {
            showFlash('Tarmoq xatoligi: ' + err, 'error');
        }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = Object.fromEntries(new FormData(e.target));
        payload.role = "student"; // Explicit role for safety
        payload.salary = 0.0;
        try {
            const response = await fetch('http://127.0.0.1:8000/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (response.ok) {
                showFlash("Muvaffaqiyatli ro'yhatdan o'tdingiz. Tizimga kiring.", 'success');
                switchTab('login');
            } else {
                showFlash(data.detail || 'Xatolik yuz berdi!', 'error');
            }
        } catch (err) {
            showFlash('Tarmoq xatoligi: ' + err, 'error');
        }
    });

    /* ---------- Full-screen constellation ---------- */
    const canvas = document.getElementById('constellation-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, pts = [];
    const mouse = { x: -999, y: -999 };

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function spawn() {
        pts = [];
        const N = Math.round(W * H / 9000);          // density based on screen area
        for (let i = 0; i < N; i++) {
            pts.push({
                x:  Math.random() * W,
                y:  Math.random() * H,
                r:  Math.random() * 1.6 + 0.5,
                vx: (Math.random() - .5) * .4,
                vy: (Math.random() - .5) * .4,
                op: Math.random() * .55 + .3,
                ph: Math.random() * Math.PI * 2
            });
        }
    }

    function draw(ts) {
        /* Semi-transparent overlay creates motion trail */
        ctx.fillStyle = 'rgba(19, 23, 43, 0.18)';
        ctx.fillRect(0, 0, W, H);

        const t = ts * 0.001;
        const LINK = 140;

        for (let i = 0; i < pts.length; i++) {
            const p = pts[i];

            /* Move */
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) { p.x = 0; p.vx *= -1; }
            if (p.x > W) { p.x = W; p.vx *= -1; }
            if (p.y < 0) { p.y = 0; p.vy *= -1; }
            if (p.y > H) { p.y = H; p.vy *= -1; }

            /* Mouse repulsion */
            const mdx = p.x - mouse.x, mdy = p.y - mouse.y;
            const md  = Math.sqrt(mdx*mdx + mdy*mdy);
            if (md < 120 && md > 0) {
                p.vx += mdx/md * .055;
                p.vy += mdy/md * .055;
                const sp = Math.hypot(p.vx, p.vy);
                if (sp > 1.6) { p.vx = p.vx/sp*1.6; p.vy = p.vy/sp*1.6; }
            }

            /* Draw star with twinkle */
            const op = Math.max(.1, Math.min(1, p.op + .28 * Math.sin(t * 1.3 + p.ph)));
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(210, 225, 255, ${op})`;
            ctx.fill();

            /* Draw links */
            for (let j = i+1; j < pts.length; j++) {
                const q = pts[j];
                const dx = p.x - q.x, dy = p.y - q.y;
                const d  = Math.sqrt(dx*dx + dy*dy);
                if (d < LINK) {
                    const a = (1 - d/LINK) * 0.35 * op;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(q.x, q.y);
                    ctx.strokeStyle = `rgba(140, 180, 255, ${a})`;
                    ctx.lineWidth  = .65;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); spawn(); });
    resize();
    /* Paint the bg colour first so there's no flicker */
    ctx.fillStyle = '#13172b';
    ctx.fillRect(0, 0, W, H);
    spawn();
    requestAnimationFrame(draw);
</script>
</body>
</html>
